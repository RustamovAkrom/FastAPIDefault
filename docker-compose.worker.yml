version: "3.9"

x-celery-base: &celery-base
  build:
    context: .
    dockerfile: deployments/compose/backend/Dockerfile
  env_file:
    - .env
  volumes:
    - ./src:/app/src
  networks:
    - backend_network
  depends_on:
    postgres:
      condition: service_healthy

services:

  # =========================
  # REDIS (default broker)
  # =========================
  redis:
    image: redis:7-alpine
    restart: always
    profiles: ["redis"]

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    volumes:
      - redis_data:/data

    networks:
      - backend_network


  # =========================
  # RABBITMQ (optional broker)
  # =========================
  rabbitmq:
    image: rabbitmq:management
    restart: always
    profiles: ["rabbitmq"]

    env_file:
      - .env

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}

    ports:
      - ${RABBITMQ_PORT:-15672}:15672
      - ${AMQP_PORT:-5672}:5672

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend_network


  # =========================
  # CELERY WORKER
  # =========================
  celery_worker:
    <<: *celery-base
    command: /start-celeryworker

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started


  # =========================
  # CELERY BEAT
  # =========================
  celery_beat:
    <<: *celery-base
    command: /start-celerybeat
    restart: always


  # =========================
  # CELERY FLOWER
  # =========================
  celery_flower:
    <<: *celery-base
    command: /start-flower
    restart: always

    ports:
      - ${CELERY_FLOWER_PORT:-5555}:5555


volumes:
  redis_data:
  rabbitmq_data:

networks:
  backend_network:
    driver: bridge
