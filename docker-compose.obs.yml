services:
  prometheus:
    # Prometheus for metrics collection
    # access via http://localhost:9090
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    networks:
      - backend_network


  grafana:
    # Grafana for metrics visualization
    # access via http://localhost:3000 (default credentials: admin/admin)
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning
      - ./deployments/grafana/dashboards:/etc/grafana/dashboards

    depends_on:
      - prometheus
      - loki
    restart: always
    networks:
      - backend_network

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9187/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3

  loki:
    # Loki for log aggregation
    # access via http://localhost:3100
    image: grafana/loki
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend_network
    restart: always

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  promtail:
    # Promtail for log shipping to Loki
    # access via http://localhost:9080 (for metrics)
    image: grafana/promtail
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./deployments/loki/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend_network
    depends_on:
      - loki
    restart: always

  node-exporter:
    # Node Exporter for host metrics
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: always
    networks:
      - backend_network

  postgres-exporter:
    # Postgres Exporter for database metrics
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      - backend_network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  backend_network:
    driver: bridge
