version: "3"

vars:
  RUNNER:
    sh: 'echo {{ .RUNNER | default "uv run" }}'
  SOURCES: src tests
  SOURCES_ROOT: src

tasks:
  default:
    cmd: task --list

  # =========================================================
  # DEVELOPMENT & RUNNING
  # =========================================================

  init:
    desc: Initialize project (install deps + setup database)
    env:
      ENV: local
    cmds:
      - uv sync
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"
      - docker compose down

  run:
    desc: Run application locally (FastAPI dev mode)
    env:
      ENV: local
    cmds:
      - docker compose up -d --wait postgres || true
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"
      - "{{.RUNNER}} fastapi dev src/dev.py"

  dev:
    desc: Run backend locally (Uvicorn reload mode)
    env:
      ENV: local
    cmds:
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"
      - "{{.RUNNER}} uvicorn dev:app --reload"

  stack:
    desc: Run full stack (DB + Monitoring + Migrations)
    cmds:
      - docker compose up -d --wait postgres
      - task: obs
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"

  # =========================================================
  # DOCKER & INFRASTRUCTURE
  # =========================================================

  up:
    desc: Start database container
    cmd: docker compose up -d --wait postgres

  down:
    desc: Stop all containers
    cmd: docker compose down

  restart:
    desc: Restart infrastructure
    cmds:
      - docker compose down
      - docker compose up -d --build

  logs:
    desc: Show logs (all services)
    cmd: docker compose logs -f

  logs-web:
    desc: Show logs (backend only)
    cmd: docker compose logs -f web

  logs-db:
    desc: Show logs (postgres only)
    cmd: docker compose logs -f postgres

  doctor:
    desc: Check infrastructure status
    cmds:
      - docker compose ps
      - docker compose logs --tail=50 web
      - docker compose logs --tail=50 postgres

  # =========================================================
  # DATABASE
  # =========================================================

  db-revision:
    desc: Generate new migration
    cmds:
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini revision --autogenerate -m '{{.MSG}}'"
      
  db-migrate:
    desc: Apply database migrations
    cmds:
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"

  db-reset:
    desc: Reset database (DROP ALL DATA)
    cmds:
      - docker compose down -v
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"

  db-shell:
    desc: Open postgres shell
    cmd: docker compose exec postgres psql -U ${POSTGRES_USER} ${POSTGRES_DB}

  admin-create:
    desc: Create superadmin user
    cmds:
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} python -m scripts.create_admin"

  # =========================================================
  # MONITORING & OBSERVABILITY
  # =========================================================

  obs:
    desc: Start monitoring stack (Prometheus, Grafana, Loki)
    cmd: docker compose up -d prometheus grafana loki promtail

  obs-down:
    desc: Stop monitoring stack
    cmd: docker compose stop prometheus grafana loki promtail

  # =========================================================
  # CODE QUALITY & TESTING
  # =========================================================

  lint:
    desc: Run linter (ruff check)
    cmd: "{{.RUNNER}} ruff check {{.SOURCES}}"

  format:
    desc: Format code with ruff
    aliases: [fmt]
    cmds:
      - "{{.RUNNER}} ruff format {{.SOURCES}}"
      - "{{.RUNNER}} ruff check --fix {{.SOURCES}}"

  deps:
    desc: Check dependencies (deptry)
    cmd: "{{.RUNNER}} deptry {{.SOURCES_ROOT}}"

  typecheck:
    desc: Type checking (mypy)
    cmd: "{{.RUNNER}} mypy src tests"

  test:
    desc: Run unit tests
    env:
      ENV: test
    cmds:
      - docker compose up -d --wait postgres-test
      - ENV=test {{.RUNNER}} pytest -vv

  test-cov:
    desc: Run tests with coverage report
    env:
      ENV: test
    cmds:
      - docker compose up -d --wait postgres-test
      - "{{.RUNNER}} coverage run -m pytest -vv"
      - "{{.RUNNER}} coverage report -m"

  test-ci:
    desc: Run tests (CI mode)
    env:
      ENV: ci
    cmd: "{{.RUNNER}} pytest"

  # =========================================================
  # CI / COMPLETE CHECKS
  # =========================================================
  pre-commit:
    desc: Run pre-commit
    cmd: uvx pre-commit run
    
  all:
    desc: Run all quality checks (lint, format, deps, typecheck, tests)
    cmds:
      - task: format
      - task: deps
      - task: typecheck
      - task: test-cov