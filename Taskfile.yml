version: "3"

vars:
  RUNNER:
    sh: 'echo {{ .RUNNER | default "uv run" }}'
  SOURCES: src tests
  SOURCES_ROOT: src

# =========================================================
# DEFAULT
# =========================================================

tasks:

  default:
    cmds:
      - task: help

  help:
    desc: Show available tasks
    cmds:
      - task --list

# =========================================================
# ENVIRONMENT
# =========================================================

  init:
    desc: First project setup (deps + db + migrations)
    env:
      ENV: local
    cmds:
      - uv sync
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"
      - docker compose down

  run:
    desc: Run the application locally for development
    env:
      ENV: local
    cmds:
      - "docker compose up -d --wait postgres || true"
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"
      - "{{.RUNNER}} fastapi dev src/dev.py"
      
  dev:
    desc: Run backend locally (with docker postgres)
    env:
      ENV: local
    cmds:
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"
      - "{{.RUNNER}} uvicorn dev:app --reload"

  prod:
    desc: Run full production stack
    env:
      ENV: prod
    cmds:
      - docker compose up -d --build
      - docker compose up

  down:
    desc: Stop ALL containers
    cmds:
      - docker compose down

  restart:
    desc: Restart infrastructure
    cmds:
      - docker compose down
      - docker compose up -d --build

# =========================================================
# DATABASE
# =========================================================

  db-up:
    desc: Apply migrations
    cmds:
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"

  db-reset:
    desc: Full reset DB (DROP ALL DATA)
    cmds:
      - docker compose down -v
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"

  db-shell:
    desc: Connect to postgres shell
    cmds:
      - docker compose exec postgres psql -U ${POSTGRES_USER} ${POSTGRES_DB}

# =========================================================
# ADMIN
# =========================================================

  create_admin:
    desc: Create super admin
    cmds:
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} python -m scripts.create_admin"

# =========================================================
# MONITORING / OBSERVABILITY
# =========================================================

  obs:
    desc: Start Prometheus + Grafana + Loki + Promtail
    cmds:
      - docker compose up -d prometheus grafana loki promtail

  obs-down:
    desc: Stop observability stack
    cmds:
      - docker compose stop prometheus grafana loki promtail

  logs:
    desc: Show logs for all services
    cmds:
      - docker compose logs -f

  logs-web:
    desc: Show backend logs
    cmds:
      - docker compose logs -f web

  logs-db:
    desc: Show postgres logs
    cmds:
      - docker compose logs -f postgres

# =========================================================
# FULL STACK
# =========================================================

  stack:
    desc: Run FULL infra DB + Monitoring + Migrations
    cmds:
      - docker compose up -d --wait postgres
      - task: obs
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"

  stack-reset:
    desc: Full infra reset
    cmds:
      - docker compose down -v
      - task: stack

# =========================================================
# CI / QUALITY
# =========================================================

  lint:
    cmds:
      - "{{.RUNNER}} ruff check {{.SOURCES}}"

  format:
    aliases: ["fmt"]
    cmds:
      - "{{.RUNNER}} ruff format {{.SOURCES}}"
      - "{{.RUNNER}} ruff check --fix {{.SOURCES}}"

  deptry:
    cmds:
      - "{{.RUNNER}} deptry {{.SOURCES_ROOT}}"

  typecheck:
    cmds:
      - "{{.RUNNER}} mypy {{.SOURCES_ROOT}}"

  test:
    env:
      ENV: test
    cmds:
      - docker compose up -d --wait postgres-test
      - ENV=test {{.RUNNER}} pytest -vv

  testcov:
    env:
      ENV: test
    cmds:
      - docker compose up -d --wait postgres-test
      - "{{.RUNNER}} coverage run -m pytest -vv"
      - "{{.RUNNER}} coverage report -m"

  ci:
    desc: Full CI pipeline
    cmds:
      - task: format
      - task: deptry
      - task: typecheck
      - task: testcov

# =========================================================
# DIAGNOSTICS
# =========================================================

  doctor:
    desc: Diagnose infra state
    cmds:
      - docker compose ps
      - docker compose logs --tail=50 web
      - docker compose logs --tail=50 postgres