version: "3"

vars:
  RUNNER:
    sh: 'echo {{ .RUNNER | default "uv run" }}'
  SOURCES: src tests
  SOURCES_ROOT: src

tasks:

  default:
    cmds:
      - task: all

  # =============================
  # Environment
  # =============================

  init:
    desc: Prepare local environment
    env:
      ENV: local
    cmds:
      - uv sync
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"
      - docker compose down

  run:
    desc: Run application locally
    env:
      ENV: local
    cmds:
      - docker compose up -d --wait postgres || true
      # - task: obs-up
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"
      - "{{.RUNNER}} uvicorn src.dev:app --reload"

  stop:
    desc: Stop containers
    cmds:
      - docker compose down

  # =============================
  # Database
  # =============================

  db-up:
    desc: Apply migrations
    cmds:
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"

  db-down:
    desc: Downgrade last migration
    cmds:
      - "{{.RUNNER}} alembic -c src/alembic.ini downgrade -1"

  db-current:
    desc: Show current revision
    cmds:
      - "{{.RUNNER}} alembic -c src/alembic.ini current"

  db-history:
    desc: Show migration history
    cmds:
      - "{{.RUNNER}} alembic -c src/alembic.ini history"

  db-revision:
    desc: Create empty migration
    cmds:
      - '{{.RUNNER}} alembic -c src/alembic.ini revision -m "{{.CLI_ARGS}}"'

  db-autogen:
    desc: Autogenerate migration from models
    cmds:
      - '{{.RUNNER}} alembic -c src/alembic.ini revision --autogenerate -m "{{.CLI_ARGS}}"'

  db-make:
    desc: Autogenerate and apply migration
    cmds:
      - task: db-autogen
      - task: db-up

  db-reset:
    desc: Full database reset
    cmds:
      - docker compose down -v
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"

  # =============================
  # Admin 
  # =============================
  create_admin:
    desc: Create super admin
    cmds:
      - docker compose up -d --wait postgres
      - "{{.RUNNER}} python -m scripts.create_admin"
  # =============================
  # Code Quality
  # =============================

  lint:
    desc: Run ruff linter
    cmds:
      - "{{.RUNNER}} ruff check {{.SOURCES}}"

  format:
    desc: Format code with ruff
    aliases: ["fmt"]
    cmds:
      - "{{.RUNNER}} ruff format {{.SOURCES}}"
      - "{{.RUNNER}} ruff check --fix {{.SOURCES}}"

  deptry:
    desc: Check dependency usage
    cmds:
      - "{{.RUNNER}} deptry {{.SOURCES_ROOT}}"

  typecheck:
    desc: Run mypy
    cmds:
      - "{{.RUNNER}} mypy {{.SOURCES_ROOT}}"

  # =============================
  # Tests
  # =============================

  test:
    desc: Run tests
    env:
      ENV: test
    cmds:
      - docker compose up -d --wait postgres-test
      - ENV=test {{.RUNNER}} pytest -vv

  testcov:
    desc: Run tests with coverage
    env:
      ENV: test
    cmds:
      - docker compose up -d --wait postgres-test
      - "{{.RUNNER}} coverage run -m pytest -vv"
      - "{{.RUNNER}} coverage report -m"
      - "{{.RUNNER}} coverage xml"

  test-ci:
    desc: Run tests in CI mode
    env:
      ENV: ci
    cmds:
      - "{{.RUNNER}} pytest"

  # =============================
  # Git Hooks
  # =============================

  pre-commit:
    desc: Run pre-commit hooks
    cmds:
      - uvx pre-commit run

  # =============================
  # Full CI
  # =============================

  # Monitoring with Prometheus
  # obs-up:
  #   desc: Start Prometheus + Grafana
  #   cmds:
  #     - docker compose up -d prometheus grafana

  # obs-down:
  #   desc: Stop observability stack
  #   cmds:
  #     - docker compose stop prometheus grafana

  # stack:
  #   desc: Run FULL infrastructure
  #   cmds:
  #     - docker compose up -d --wait postgres
  #     - task: obs-up
  #     - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"

  all:
    desc: Run full CI pipeline
    cmds:
      - task: format
      - task: deptry
      - task: typecheck
      - task: testcov