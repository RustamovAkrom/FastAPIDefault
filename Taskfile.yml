version: "3"

vars:
  RUNNER:
    sh: 'echo {{ .RUNNER | default "uv run --no-sync" }}'
  SOURCES: src tests
  SOURCES_ROOT: src

tasks:
  default:
    cmd: task --list

  # =========================================================
  # DATABASE
  # =========================================================
  db-up:
    cmds:
      - docker compose up -d --wait postgres

  db-revision:
    desc: Generate new migration
    cmds:
      - task: db-up
      - "{{.RUNNER}} alembic -c src/alembic.ini revision --autogenerate -m '{{.MSG}}'"

  db-migrate:
    desc: Apply database migrations
    cmds:
      - task: db-up
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"

  # =========================================================
  # DEVELOPMENT & RUNNING
  # =========================================================

  init:
    desc: Initialize project
    env:
      ENV: local
    cmds:
      - uv sync
      - task: db-up
      - task: db-migrate

  dev:
    desc: Run backend locally (dev mode)
    env:
      ENV: local
    cmds:
      - task: db-up
      - task: db-migrate
      - "{{.RUNNER}} uvicorn src.dev:app --reload --reload-dir src"

  prod:
    desc: Run production stack
    cmds:
      - docker compose up -d --build
      - docker compose ps

  stack:
    desc: Run full stack (safe)
    cmds:
      - task: prod
      - task: obs || true
      - task: db-migrate

  # =========================================================
  # DOCKER & INFRASTRUCTURE
  # =========================================================

  down:
    desc: Stop all containers
    cmd: docker compose down

  restart:
    desc: Restart infrastructure
    cmds:
      - docker compose up -d --build --force-recreate

  logs:
    desc: Show logs (all services)
    cmd: docker compose logs -f --tail=100

  logs-web:
    desc: Show logs (backend only)
    cmd: docker compose logs -f web

  logs-db:
    desc: Show logs (postgres only)
    cmd: docker compose logs -f postgres

  doctor:
    desc: Check infrastructure status
    cmds:
      - docker compose ps
      - docker compose top
      - docker compose logs --tail=50 web
      - docker compose logs --tail=50 postgres

  db-reset:
    desc: Reset database (ONLY LOCAL!)
    env:
      ENV: local
    cmds:
      - docker compose down -v
      - task: db-up
      - "{{.RUNNER}} alembic -c src/alembic.ini upgrade head"

  db-shell:
    cmd: docker compose exec postgres sh -c 'psql -U $POSTGRES_USER $POSTGRES_DB'

  # =========================================================
  # MONITORING & OBSERVABILITY
  # =========================================================

  obs:
    desc: Start monitoring stack (optional)
    cmd: docker compose up -d prometheus grafana loki promtail node-exporter postgres-exporter || true

  obs-down:
    desc: Stop monitoring stack
    cmd: docker compose stop prometheus grafana loki promtail node-exporter postgres-exporter || true

  # =========================================================
  # CODE QUALITY & TESTING
  # =========================================================

  lint:
    desc: Run linter (ruff check)
    cmd: "{{.RUNNER}} ruff check {{.SOURCES}}"

  format:
    desc: Format code with ruff
    aliases: [fmt]
    cmds:
      - "{{.RUNNER}} ruff format {{.SOURCES}}"
      - "{{.RUNNER}} ruff check --fix {{.SOURCES}}"

  deps:
    desc: Check dependencies (deptry)
    cmd: "{{.RUNNER}} deptry {{.SOURCES_ROOT}}"

  typecheck:
    desc: Type checking (mypy)
    cmd: "{{.RUNNER}} mypy src tests"

  test-setup:
    cmds:
      - docker compose down -v postgres-test || true
      - docker compose up -d --wait postgres-test

  test:
    desc: Run unit tests
    env:
      ENV: test
    cmds:
      - task: test-setup
      - ENV=test {{.RUNNER}} pytest -vv

  test-cov:
    desc: Run tests with coverage report
    env:
      ENV: test
    cmds:
      - task: test-setup
      - "{{.RUNNER}} coverage run -m pytest -vv"
      - "{{.RUNNER}} coverage report -m --fail-under=80"

  # =========================================================
  # CI / COMPLETE CHECKS
  # =========================================================
  pre-commit:
    desc: Run pre-commit
    cmd: uvx pre-commit run

  security:
    desc: Security scan (bandit)
    cmd: "{{.RUNNER}} bandit -r src -q"

  imports:
    desc: Check import sorting
    cmd: "{{.RUNNER}} ruff check --select I {{.SOURCES}}"

  build:
    desc: Check docker build
    cmd: docker compose build --no-cache

  all:
    desc: Run all quality checks (lint, format, deps, typecheck, tests)
    cmds:
      - task: format
      - task: deps
      - task: typecheck
      - task: test-cov

  test-ci:
    desc: CI pipline (no formatting)
    cmds:
      - task: lint
      - task: imports
      - task: deps
      - task: typecheck
      - task: security
      - task: test-cov
