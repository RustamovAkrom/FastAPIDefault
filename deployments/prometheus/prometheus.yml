global:
  scrape_interval: 5s

scrape_configs:
  # Project monitoring
  - job_name: "fastapi"
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"] # for prod
      
  # Server monitoring (Optional)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Database monitoring (Optional)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
