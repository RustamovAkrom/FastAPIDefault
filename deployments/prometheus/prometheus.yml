global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "fastapi"
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"] # for prod
      # - targets: ["host.docker.internal:8000"] # for local and dev modes for production use only web:8000
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
