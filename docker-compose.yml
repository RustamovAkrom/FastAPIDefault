version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: deployments/compose/backend/Dockerfile
    command: /start
    env_file: [.env]
    environment:
      ENV: ${ENV:-dev}
    restart: always

    volumes:
      - ./src:/app/src

    ports:
      - ${PORT:-8001}:8000

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - backend_network

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    mem_limit: 1g
    cpus: 2

    read_only: true
    tmpfs:
      - /tmp

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

#      redis:
#        condition: service_healthy
#      rabbitmq:
#        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend_network:
    driver: bridge
